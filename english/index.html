<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e7490">
<meta name="description" content="意図が伝わる英語を学ぶ日常英会話アプリ。学校式の返答と、実際に伝わる返答の2つを比べて学べます。音声入力・発音再生・復習クイズ対応。端末内保存・ログイン不要・無料。">
<title>つたわる英語 - 意図が伝わる日常英会話</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#f0fdfa; --bg2:#eef2ff; --bg3:#fdf2f8;
    --ink:#0f172a; --sub:#64748b; --sub2:#94a3b8; --line:#e7ebf1;
    --brand:#0f766e; --brand2:#4f46e5; --brand3:#0891b2;
    --brand-grad:linear-gradient(135deg,#0f766e,#0891b2 55%,#4f46e5);
    --brand-soft:#e0f7f5; --brand-soft2:#eef0ff;
    --school:#b45309; --school-line:#f5c66b; --school-soft:#fef6e2; --school-soft2:#fdecc4;
    --natural:#047857; --natural-line:#7fe0b7; --natural-soft:#e7fbf2; --natural-soft2:#c9f5e0;
    --card:#ffffff;
    --shadow:0 20px 40px -18px rgba(15,23,42,.22), 0 3px 10px rgba(15,23,42,.05);
    --shadow-sm:0 8px 20px -10px rgba(15,23,42,.18);
    --glow-brand:0 10px 24px -8px rgba(15,118,110,.4);
    --radius:24px; --radius-sm:15px; --radius-xs:11px;
    --font-jp:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;
    --font-en:'Poppins','Zen Kaku Gothic New',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:var(--font-jp);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 52%,var(--bg3));
    background-attachment:fixed;
    position:relative; overflow-x:hidden;
    min-height:100vh;
    padding-bottom:calc(90px + env(safe-area-inset-bottom));
    line-height:1.65;
  }
  /* ふんわりした装飾ブロブ（背景の奥行き） */
  body::before,body::after{
    content:""; position:fixed; border-radius:50%; filter:blur(70px);
    z-index:0; pointer-events:none; opacity:.55;
  }
  body::before{ width:300px; height:300px; top:-90px; right:-70px; background:radial-gradient(circle,#5eead4,transparent 72%); }
  body::after{ width:340px; height:340px; bottom:40px; left:-110px; background:radial-gradient(circle,#c4b5fd,transparent 72%); }
  .wrap{max-width:640px; margin:0 auto; padding:18px 16px; position:relative; z-index:1;}

  header.app{ text-align:center; padding:18px 12px 8px; }
  header.app .eyebrow{
    font-family:var(--font-en); font-size:.62rem; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:var(--brand3); opacity:.8; margin-bottom:8px;
  }
  header.app .logo{
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--font-jp); font-size:1.7rem; font-weight:900;
    letter-spacing:.01em;
    background:var(--brand-grad); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  header.app .logo .mark{
    width:46px;height:46px;border-radius:16px;
    background:var(--brand-grad);
    color:#fff; display:grid; place-items:center; font-size:1.35rem;
    box-shadow:var(--glow-brand);
    -webkit-text-fill-color:#fff;
  }
  header.app p.tag{margin:10px 0 0; color:var(--sub); font-size:.85rem;}
  header.app p.tag b{color:var(--brand); font-weight:700;}

  /* ==== パネル切替 ==== */
  .panel{display:none; animation:fade .3s cubic-bezier(.2,.7,.3,1);}
  .panel.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(10px);}to{opacity:1; transform:none;}}

  /* ==== 入力エリア ==== */
  .searchbox{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:16px; margin-bottom:16px; border:1px solid rgba(15,23,42,.04);
  }
  .searchbox textarea{
    width:100%; border:2px solid var(--line); border-radius:var(--radius-sm);
    padding:13px 15px; font-size:1rem; resize:none; font-family:inherit;
    color:var(--ink); background:#f8fafc; min-height:58px;
    transition:border-color .2s, box-shadow .2s, background .2s;
  }
  .searchbox textarea::placeholder{ color:var(--sub2); }
  .searchbox textarea:focus{
    outline:none; border-color:var(--brand3); background:#fff;
    box-shadow:0 0 0 4px rgba(8,145,178,.12);
  }
  .controls{display:flex; gap:7px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  .seg{display:inline-flex; background:#f1f5f9; border-radius:999px; padding:3px;}
  .seg button{
    border:none; background:transparent; padding:6px 11px; border-radius:999px;
    font-size:.78rem; color:var(--sub); cursor:pointer; font-weight:600; transition:.2s; white-space:nowrap;
  }
  .seg button.on{background:#fff; color:var(--brand); box-shadow:0 2px 6px rgba(15,23,42,.1);}
  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:700; white-space:nowrap;
    border-radius:var(--radius-sm); padding:11px 14px; font-size:.92rem;
    transition:transform .12s ease, box-shadow .2s ease, filter .2s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{
    background:var(--brand-grad); background-size:160% 160%; color:#fff;
    box-shadow:var(--glow-brand); flex:1;
  }
  .btn-primary:active{ filter:brightness(.96); }
  .btn-mic{
    background:#fff; color:var(--brand); border:2px solid var(--brand-soft);
    width:46px; height:46px; border-radius:50%; font-size:1.2rem; display:grid; place-items:center; padding:0;
    box-shadow:var(--shadow-sm); flex-shrink:0;
  }
  .btn-mic.rec{background:linear-gradient(135deg,#f43f5e,#ef4444); color:#fff; border-color:transparent; animation:pulse 1.1s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}70%{box-shadow:0 0 0 14px rgba(239,68,68,0);}100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .chip{
    background:#fff; border:1.5px solid var(--line); border-radius:999px;
    padding:7px 13px; font-size:.8rem; color:var(--brand); cursor:pointer; font-weight:600;
    transition:.15s;
  }
  .chip:active{background:var(--brand-soft); border-color:var(--brand-soft); transform:scale(.97);}
  .hint{font-size:.75rem; color:var(--sub2); margin-top:10px; line-height:1.6;}

  /* ==== 結果カード ==== */
  .notice{
    background:linear-gradient(135deg,#fff7ed,#fff1e6); border:1px solid #fed7aa; color:#9a3412;
    border-radius:var(--radius-sm); padding:12px 15px; font-size:.82rem; margin-bottom:14px;
    box-shadow:var(--shadow-sm);
  }
  .empty{ text-align:center; color:var(--sub); padding:40px 16px; font-size:.9rem; }
  .empty .big,.list-empty .big{
    font-size:2rem; display:flex; align-items:center; justify-content:center;
    width:76px; height:76px; margin:0 auto 14px; border-radius:50%;
    background:linear-gradient(135deg,var(--brand-soft),var(--brand-soft2));
  }

  .card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:20px 18px 18px; margin-bottom:16px; overflow:hidden; position:relative;
    border:1px solid rgba(15,23,42,.04);
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:5px;
    background:var(--brand-grad);
  }
  .card .cat{
    display:inline-block; font-size:.68rem; font-weight:700; color:var(--brand);
    background:var(--brand-soft); padding:4px 12px; border-radius:999px; margin-bottom:10px;
    letter-spacing:.02em;
  }
  .card .prompt-en{
    font-family:var(--font-en); font-size:1.2rem; font-weight:700; color:var(--ink); margin:4px 0 2px;
    letter-spacing:-.01em;
  }
  .card .prompt-ja{font-size:.86rem; color:var(--sub); margin:0 0 10px;}
  .card .situation{
    font-size:.82rem; color:#0f766e; background:linear-gradient(135deg,#f0fdfa,#ecfeff);
    border-radius:var(--radius-xs); padding:10px 13px; margin:8px 0 14px;
    border:1px solid #d3f5ee;
  }
  .answer{
    border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:12px; position:relative;
    border-left:4px solid transparent;
  }
  .answer.school{background:linear-gradient(135deg,var(--school-soft),var(--school-soft2)); border-left-color:var(--school-line);}
  .answer.natural{background:linear-gradient(135deg,var(--natural-soft),var(--natural-soft2)); border-left-color:var(--natural-line);}
  .answer .lbl{
    font-size:.7rem; font-weight:800; letter-spacing:.04em; margin-bottom:6px;
    display:flex; align-items:center; gap:6px; text-transform:uppercase;
  }
  .answer.school .lbl{color:var(--school);}
  .answer.natural .lbl{color:var(--natural);}
  .answer .en{font-family:var(--font-en); font-size:1.08rem; font-weight:600; color:var(--ink); padding-right:4px;}
  .answer .ja{font-size:.83rem; color:var(--sub); margin-top:3px;}
  .answer .tools{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;}
  .mini{
    border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:.76rem;
    background:rgba(255,255,255,.65); border:1px solid rgba(15,23,42,.06); color:var(--ink);
    padding:7px 11px; border-radius:999px; display:inline-flex; align-items:center; gap:4px;
    backdrop-filter:blur(4px); transition:.15s;
  }
  .mini:active{transform:scale(.94); background:#fff;}
  .point{
    background:linear-gradient(135deg,#eff6ff,#f5f3ff); border-left:4px solid #6366f1; border-radius:var(--radius-xs);
    padding:12px 14px; font-size:.83rem; color:#312e81; margin-top:8px;
  }
  .point b{color:#4338ca;}
  .card .card-foot{display:flex; justify-content:flex-end; align-items:center; margin-top:12px;}
  .fav-btn{
    border:1.5px solid var(--line); background:#fff; cursor:pointer; font-size:.8rem; font-weight:700;
    color:var(--sub2); padding:7px 15px; border-radius:999px; display:inline-flex; align-items:center; gap:6px;
    transition:.15s;
  }
  .fav-btn .st{font-size:1.05rem; line-height:1;}
  .fav-btn:active{transform:scale(.96);}
  .fav-btn.on{color:#b45309; border-color:#fde68a; background:#fffbeb;}

  .related{margin-top:6px;}
  .related .related-lbl{font-size:.78rem; color:var(--sub); margin-bottom:8px; font-weight:600;}

  /* 折りたたみ（場面別） */
  .accordion-head{ cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .accordion-head .arrow{transition:transform .2s; color:var(--sub2); font-size:1.1rem;}
  .card.open .accordion-head .arrow{transform:rotate(90deg); color:var(--brand);}
  .accordion-body{display:none; margin-top:14px;}
  .card.open .accordion-body{display:block;}

  /* セクション見出し */
  .section-title{font-family:var(--font-jp); font-size:1.15rem; font-weight:900; color:var(--ink); margin:8px 4px 12px;}
  .section-sub{font-size:.82rem; color:var(--sub); margin:-8px 4px 16px;}

  .cat-tile{
    background:var(--card); border-radius:18px; box-shadow:var(--shadow-sm);
    padding:15px 16px; margin-bottom:11px; cursor:pointer; display:flex; align-items:center; gap:14px;
    border:1px solid rgba(15,23,42,.04); transition:transform .12s, box-shadow .2s;
  }
  .cat-tile:active{transform:scale(.985); box-shadow:var(--shadow);}
  .cat-tile .ico{
    font-size:1.4rem; width:48px; height:48px; border-radius:15px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--brand-soft),var(--brand-soft2));
  }
  .cat-tile .txt b{display:block; font-size:1rem; font-weight:800;}
  .cat-tile .txt span{font-size:.78rem; color:var(--sub);}
  .cat-tile .count{margin-left:auto; font-size:.76rem; color:var(--brand); font-weight:700; white-space:nowrap;}

  /* クイズ */
  .quiz-card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px 20px; text-align:center; border:1px solid rgba(15,23,42,.04);}
  .quiz-card .q-ja{font-family:var(--font-jp); font-size:1.3rem; font-weight:900; margin:12px 0 6px;}
  .quiz-card .q-sit{font-size:.83rem; color:var(--sub); margin-bottom:18px;}
  .quiz-reveal{margin-top:16px; text-align:left;}
  .quiz-progress{margin-bottom:14px;}
  .quiz-progress-num{font-size:.78rem; color:var(--sub); font-weight:700;}
  .quiz-progress-tag{
    font-size:.68rem; color:var(--brand); background:var(--brand-soft); padding:2px 9px;
    border-radius:999px; margin-left:8px; font-weight:700;
  }
  .quiz-progress-track{height:6px; border-radius:999px; background:#eef2f7; margin-top:8px; overflow:hidden;}
  .quiz-progress-fill{height:100%; border-radius:999px; background:var(--brand-grad); transition:width .3s ease;}
  .quiz-done-emoji{font-size:2.6rem; margin-bottom:6px;}
  .score-badge{
    display:inline-flex; align-items:baseline; gap:6px; margin-top:6px;
    background:linear-gradient(135deg,var(--brand-soft),var(--brand-soft2));
    padding:10px 22px; border-radius:999px;
  }
  .score-badge b{font-family:var(--font-en); font-size:1.6rem; color:var(--brand); font-weight:800;}
  .score-badge span{font-size:.85rem; color:var(--sub); font-weight:600;}
  .quiz-grade{display:flex; gap:10px; margin-top:16px;}
  .quiz-grade .btn{flex:1;}
  .btn-ok{background:linear-gradient(135deg,#059669,#10b981); color:#fff; box-shadow:0 8px 18px -6px rgba(5,150,105,.45);}
  .btn-ng{background:#f1f5f9; color:#475569;}

  /* トースト */
  .toast{
    position:fixed; left:50%; bottom:calc(100px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
    background:rgba(15,23,42,.94); backdrop-filter:blur(8px); color:#fff; padding:11px 20px; border-radius:999px; font-size:.85rem;
    opacity:0; pointer-events:none; transition:.25s; z-index:60; box-shadow:var(--shadow); font-weight:500;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ボトムナビ */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:rgba(255,255,255,.85); backdrop-filter:blur(16px) saturate(160%);
    border-top:1px solid var(--line);
    box-shadow:0 -8px 24px rgba(15,23,42,.06);
    display:flex; padding:7px 4px calc(7px + env(safe-area-inset-bottom));
  }
  nav.tabbar button{
    flex:1; border:none; background:transparent; cursor:pointer; color:var(--sub2);
    font-family:var(--font-jp); font-size:.66rem; font-weight:700; padding:4px 2px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  nav.tabbar .i-wrap{
    width:42px; height:28px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  nav.tabbar button.on .i-wrap{background:var(--brand-soft);}
  nav.tabbar button .i{font-size:1.2rem; line-height:1;}
  nav.tabbar button.on{color:var(--brand);}
  nav.tabbar button .badge{
    position:absolute; transform:translate(14px,-6px); background:#ef4444; color:#fff;
    font-size:.6rem; min-width:16px; height:16px; border-radius:8px; padding:0 4px; line-height:16px;
  }

  .list-empty{text-align:center; color:var(--sub); padding:44px 16px;}

  .row-item{
    background:var(--card); border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);
    padding:13px 15px; margin-bottom:9px; display:flex; align-items:center; gap:10px; cursor:pointer;
    border:1px solid rgba(15,23,42,.04); transition:transform .12s;
  }
  .row-item:active{transform:scale(.985);}
  .row-item .r-txt{flex:1; min-width:0;}
  .row-item .r-txt b{display:block; font-size:.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row-item .r-txt span{font-size:.76rem; color:var(--sub);}
  .row-item .r-del{border:none; background:transparent; color:var(--sub2); font-size:1.1rem; cursor:pointer; padding:4px;}

  .toolbar{display:flex; justify-content:flex-end; margin-bottom:10px;}
  .link-btn{background:transparent; border:none; color:var(--brand); font-weight:700; font-size:.8rem; cursor:pointer;}

  /* 発音練習 */
  .rec-box{background:linear-gradient(135deg,#fff7fb,#fdf2f8); border:1px solid #fbcfe8; border-radius:var(--radius-xs); padding:11px 13px; margin-top:10px;}
  .rec-box .rec-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .rec-box .rec-status{font-size:.76rem; color:var(--sub); margin-top:7px;}

  footer.app{text-align:center; color:var(--sub2); font-size:.72rem; padding:20px 12px 6px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="eyebrow">Daily English, the way it's really spoken</div>
    <div class="logo"><span class="mark">💬</span>つたわる英語</div>
    <p class="tag">「文法的に正しい英語」より、<b>意図が伝わる英語</b>を。</p>
  </header>

  <!-- ===== 会話（自由入力）===== -->
  <section id="panel-talk" class="panel active">
    <div class="searchbox">
      <textarea id="queryInput" rows="2" placeholder="日本語でも英語でもOK（例：ペンを持っていますか）"></textarea>
      <div class="controls">
        <div class="seg" id="langSeg" title="音声入力の言語">
          <button data-lang="ja-JP" class="on">🎙 日本語</button>
          <button data-lang="en-US">🎙 English</button>
        </div>
        <button class="btn-mic" id="micBtn" title="音声で入力" aria-label="音声で入力">🎤</button>
        <button class="btn btn-primary" id="searchBtn">調べる</button>
      </div>
      <div class="chips" id="exampleChips"></div>
      <div class="hint">💡 相手のひと言（例: Do you have a pen?）や、言いたい日本語（例: これいくらですか）を入れてみてください。</div>
    </div>
    <div id="talkResult"></div>
  </section>

  <!-- ===== 場面別 ===== -->
  <section id="panel-scenes" class="panel">
    <div class="section-title">場面から探す</div>
    <div class="section-sub">よく使う場面ごとに、伝わる返し方をまとめています。</div>
    <div id="sceneList"></div>
  </section>

  <!-- ===== クイズ ===== -->
  <section id="panel-quiz" class="panel">
    <div class="section-title">復習クイズ</div>
    <div class="section-sub">日本語を見て「伝わる英語」を思い出しましょう。</div>
    <div id="quizArea"></div>
  </section>

  <!-- ===== お気に入り ===== -->
  <section id="panel-fav" class="panel">
    <div class="section-title">お気に入り</div>
    <div class="section-sub">⭐ を付けた表現がここに集まります。</div>
    <div id="favList"></div>
  </section>

  <!-- ===== 履歴 ===== -->
  <section id="panel-history" class="panel">
    <div class="section-title">履歴</div>
    <div class="toolbar"><button class="link-btn" id="clearHistory">すべて消す</button></div>
    <div id="historyList"></div>
  </section>

  <footer class="app">
    端末内に保存・ログイン不要・無料 ／ 音声は端末の機能を利用します
  </footer>
</div>

<nav class="tabbar">
  <button data-tab="talk" class="on"><span class="i-wrap"><span class="i">💬</span></span><span class="lbl">会話</span></button>
  <button data-tab="scenes"><span class="i-wrap"><span class="i">📚</span></span><span class="lbl">場面別</span></button>
  <button data-tab="quiz"><span class="i-wrap"><span class="i">🎯</span></span><span class="lbl">クイズ</span></button>
  <button data-tab="fav"><span class="i-wrap"><span class="i">⭐</span></span><span class="lbl">お気に入り</span></button>
  <button data-tab="history"><span class="i-wrap"><span class="i">🕘</span></span><span class="lbl">履歴</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   つたわる英語 — 意図が伝わる日常英会話アプリ（単一HTML・無料・オフライン）
   データ構造（枠組み）: 1エントリ = 1つの場面
     id        : 一意なID
     category  : greeting | shopping | travel | business
     prompt    : {en, ja}  相手のひと言 / 言いたいこと
     situation : その場面の説明（意図のヒント）
     keywords  : マッチング用キーワード（日英まぜてOK）
     school    : {en, ja}  学校で習う形の返答・訳
     natural   : {en, ja}  実際に伝わる返答・訳
     point     : なぜそう返す/言うのかの解説
   ここに追記するだけで例文を増やせます。

/* =========================================================================
   マッチングエンジン（用意した例文集から一番近いものを探す）
   ========================================================================= */
function normalize(s){
  return String(s||"").toLowerCase()
    .replace(/[.,!?;:"'()\[\]、。！？「」『』]/g," ")
    .replace(/\s+/g," ").trim();
}
function scoreEntry(query, e){
  const qRaw = query.trim();
  const q = normalize(query);
  if(!q) return 0;
  const enHay = normalize([e.prompt.en, e.school.en, e.natural.en, e.keywords.join(" ")].join(" "));
  const jaHay = [e.prompt.ja, e.situation, e.keywords.join(" ")].join(" ");
  let score = 0;

  // 完全 or 部分の丸ごと一致（英語）
  if(enHay.includes(q)) score += 10;
  const promptEnN = normalize(e.prompt.en);
  if(promptEnN && (promptEnN === q)) score += 40;

  // 丸ごと一致（日本語生テキスト）
  if(qRaw && jaHay.includes(qRaw)) score += 10;
  if(normalize(e.prompt.ja) && qRaw && (e.prompt.ja.replace(/[（(].*?[)）]/g,"").includes(qRaw) || qRaw.includes(e.prompt.ja.replace(/[（(].*?[)）]/g,"")))) score += 20;

  // キーワード一致（日英まぜ）
  for(const k of e.keywords){
    const kn = normalize(k);
    if(kn && q.includes(kn)) score += Math.max(3, Math.ceil(kn.length/3));
    if(k && qRaw.includes(k)) score += Math.max(3, Math.ceil(k.length/2)); // 日本語キーワードの素直な部分一致
  }

  // 英単語の重なり
  const qWords = q.split(" ").filter(w=>w.length>=2);
  const enWords = new Set(enHay.split(" "));
  for(const w of qWords){ if(enWords.has(w)) score += 2; }

  // 日本語 n-gram の重なり（2〜3文字）
  const jaQuery = qRaw.replace(/[a-zA-Z0-9\s]/g,"");
  for(let n=3;n>=2;n--){
    for(let i=0;i+n<=jaQuery.length;i++){
      const g = jaQuery.slice(i,i+n);
      if(g && jaHay.includes(g)) score += n;
    }
  }
  return score;
}
function search(query){
  // どんな入力でも「一番近い例文」を必ず返す（0点でも空にはしない）。
  // ぴったりかどうかは呼び出し側が MATCH_STRONG で判定して表示を変える。
  const ranked = PHRASES
    .map(e=>({ e, s:scoreEntry(query,e) }))
    .sort((a,b)=>b.s-a.s);
  return ranked;
}
const MATCH_STRONG = 8; // これ以上なら「ぴったり」扱い

function speak(text, rate){
  if(!("speechSynthesis" in window)){ toast("この端末は音声読み上げに未対応です"); return; }
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = rate || 1;
    const v = window.speechSynthesis.getVoices().find(v=>/en(-|_)?US/i.test(v.lang)) ||
              window.speechSynthesis.getVoices().find(v=>/^en/i.test(v.lang));
    if(v) u.voice = v;
    window.speechSynthesis.speak(u);
  }catch(e){ toast("読み上げに失敗しました"); }
}
function answerBlock(kind, label, data, entryId){
  const cls = kind==="school" ? "school" : "natural";
  const icon = kind==="school" ? "🏫" : "💡";
  const wrap = el("div","answer "+cls);

       <button class="mini" data-act="speak" data-rate="0.65">🐢 ゆっくり</button>
       <button class="mini" data-act="rec">🎙️ 発音練習</button>

  wrap.querySelectorAll('[data-act="speak"]').forEach(b=>{

  wrap.querySelector('[data-act="rec"]').onclick = (ev)=> togglePronunciation(ev.target.closest(".answer").querySelector(".rec-host"), data.en);
  return wrap;
}

/* ===== 発音練習（録音して聞き比べ）===== */
let activeRecorder = null;
function togglePronunciation(host, modelText){
  if(host.dataset.open==="1"){ host.innerHTML=""; host.dataset.open="0"; return; }
  host.dataset.open="1";
  const supported = !!(navigator.mediaDevices && window.MediaRecorder);
  const box = el("div","rec-box");
  if(!supported){
    box.innerHTML = `<div class="rec-status">この端末は録音に未対応です。お手本の🔊で発音を確認しましょう。</div>`;
    host.innerHTML=""; host.appendChild(box); return;
  }
  box.innerHTML = `<div class="rec-row">
      <button class="mini" data-r="model">🔊 お手本</button>
      <button class="mini" data-r="start">⏺️ 録音</button>
      <button class="mini" data-r="play" disabled>▶️ 自分の声</button>
    </div><div class="rec-status">「⏺️ 録音」→ 発音 →「⏹️ 停止」→ お手本と聞き比べ。</div>`;
  host.innerHTML=""; host.appendChild(box);
  const status = box.querySelector(".rec-status");
  const btnStart = box.querySelector('[data-r="start"]');
  const btnPlay  = box.querySelector('[data-r="play"]');
  box.querySelector('[data-r="model"]').onclick = ()=> speak(modelText, 0.85);
  let chunks=[], mediaRec=null, url=null, stream=null;
  btnStart.onclick = async ()=>{
    if(mediaRec && mediaRec.state==="recording"){
      mediaRec.stop(); return;
    }
    try{
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec = new MediaRecorder(stream); chunks=[];
      mediaRec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
      mediaRec.onstop = ()=>{
        const blob = new Blob(chunks, {type:chunks[0]?.type||"audio/webm"});
        if(url) URL.revokeObjectURL(url);
        url = URL.createObjectURL(blob);
        btnPlay.disabled=false; btnStart.textContent="⏺️ 録音"; btnStart.classList.remove("rec");
        status.textContent="録音できました。▶️で自分の声、🔊でお手本を聞き比べましょう。";
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRec.start();
      btnStart.textContent="⏹️ 停止"; btnStart.classList.add("rec");
      status.textContent="録音中… はっきり発音してみましょう。";
    }catch(err){ status.textContent="マイクを使えませんでした（権限をご確認ください）。"; }
  };
  btnPlay.onclick = ()=>{ if(url){ const a=new Audio(url); a.play(); } };
}

    const c = el("button","chip", esc(x));

function doSearch(){
  const q = $("#queryInput").value.trim();
  const host = $("#talkResult"); host.innerHTML="";
  if(!q){ toast("調べたい言葉を入れてください"); return; }
  const ranked = search(q);
  if(ranked.length===0){
    host.appendChild(el("div","empty",
      `<span class="big">🔍</span>ぴったりの例文がまだありません。<br>下の例をタップするか、言い方を変えて試してみてください。`));
    renderExampleChips();
    return;
  }
  const best = ranked[0];
  if(best.s < MATCH_STRONG){
    host.appendChild(el("div","notice","🔎 ぴったりの例文が見つからなかったので、<b>近い場面</b>を表示しています。"));
  }
  host.appendChild(renderCard(best.e));
  addHistory(q, best.e.id);

  const related = ranked.slice(1,4);
  if(related.length){
    const rel = el("div","related");
    rel.appendChild(el("div","related-lbl","こんな場面も見てみる？"));
    related.forEach(r=>{
      const c = el("button","chip", esc(r.e.prompt.ja || r.e.prompt.en));
      c.onclick = ()=>{ host.querySelectorAll('.related').forEach(n=>n.remove()); host.insertBefore(renderCard(r.e), rel); window.scrollTo({top:0,behavior:"smooth"}); };
      rel.appendChild(c);
    });
    host.appendChild(rel);
  }
}

/* ===== 音声入力（Web Speech API）===== */
let recognition=null;
function setupRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ return null; }
  const r = new SR();
  r.interimResults=false; r.maxAlternatives=1;
  r.onresult = ev=>{ const t = ev.results[0][0].transcript; $("#queryInput").value = t; doSearch(); };
  r.onerror = ev=>{ toast(ev.error==="not-allowed"?"マイクの使用が許可されていません":"音声認識に失敗しました"); };
  r.onend = ()=>{ $("#micBtn").classList.remove("rec"); };
  return r;
}
function toggleMic(){
  if(!recognition) recognition = setupRecognition();
  if(!recognition){ toast("この端末は音声入力に未対応です（Chrome推奨）"); return; }
  const btn = $("#micBtn");
  if(btn.classList.contains("rec")){ recognition.stop(); return; }
  try{
    recognition.lang = settings.voiceLang;
    recognition.start();
    btn.classList.add("rec");
    toast(settings.voiceLang==="ja-JP"?"日本語で話してください":"Speak in English");
  }catch(e){ /* 連続startのガード */ }
}

/* =========================================================================
   場面別パネル
   ========================================================================= */
function renderScenes(){
  const host = $("#sceneList"); host.innerHTML="";
  Object.keys(CATEGORIES).forEach(key=>{
    const c = CATEGORIES[key];
    const items = PHRASES.filter(p=>p.category===key);
    const tile = el("div","cat-tile");
    tile.innerHTML = `<span class="ico">${c.icon}</span>
      <div class="txt"><b>${c.label}</b><span>${c.desc}</span></div>
      <span class="count">${items.length}件 ›</span>`;
    tile.onclick = ()=> openCategory(key);
    host.appendChild(tile);
  });
}
function openCategory(key){
  const c = CATEGORIES[key];
  const host = $("#sceneList"); host.innerHTML="";
  const back = el("button","link-btn","‹ 場面一覧にもどる"); back.onclick=renderScenes;
  const bar = el("div","toolbar"); bar.style.justifyContent="flex-start"; bar.appendChild(back);
  host.appendChild(bar);
  host.appendChild(el("div","section-title", `${c.icon} ${c.label}`));
  PHRASES.filter(p=>p.category===key).forEach(e=>{
    const card = renderCard(e);
    card.classList.add("collapsed");
    // 折りたたみ表示にする
    const head = el("div","accordion-head");
    head.innerHTML = `<div><div class="prompt-en">${esc(e.prompt.en)}</div><div class="prompt-ja">${esc(e.prompt.ja)}</div></div><span class="arrow">›</span>`;
    // カードの中身を body に移す
    const body = el("div","accordion-body");
    while(card.children.length) body.appendChild(card.children[0]);
    // 先頭の cat バッジは head の上に残したいので作り直し
    card.innerHTML="";
    card.appendChild(el("span","cat", `${c.icon} ${c.label}`));
    card.appendChild(head);
    card.appendChild(body);
    head.onclick = (ev)=>{ if(ev.target.closest(".mini,.fav-btn,.rec-box")) return; card.classList.toggle("open"); };
    host.appendChild(card);
  });
}

/* =========================================================================
   お気に入り / 履歴
   ========================================================================= */
function toggleFav(id){
  if(favorites.includes(id)){ favorites = favorites.filter(x=>x!==id); toast("お気に入りから外しました"); }
  else{ favorites.unshift(id); toast("お気に入りに追加しました ⭐"); }
  store.set(LS.fav, favorites);
}
function renderFav(){
  const host = $("#favList"); host.innerHTML="";
  if(!favorites.length){ host.appendChild(el("div","list-empty",`<span class="big">⭐</span>お気に入りはまだありません。<br>カードの ☆ を押すとここに追加されます。`)); return; }
  favorites.map(byId).filter(Boolean).forEach(e=> host.appendChild(renderCard(e)));
}
function addHistory(q, id){
  history.unshift({ q, id, t:Date.now() });
  history = history.slice(0,50);
  store.set(LS.hist, history);
  refreshBadges();
}
function renderHistory(){
  const host = $("#historyList"); host.innerHTML="";
  if(!history.length){ host.appendChild(el("div","list-empty",`<span class="big">🕘</span>まだ履歴はありません。`)); return; }
  history.forEach((h,idx)=>{
    const e = byId(h.id); if(!e) return;
    const row = el("div","row-item");
    const d = new Date(h.t);
    const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    row.innerHTML = `<div class="r-txt"><b>${esc(h.q)}</b><span>${esc(e.prompt.en)} ・ ${time}</span></div><button class="r-del">✕</button>`;
    row.querySelector(".r-txt").onclick = ()=>{ switchTab("talk"); $("#queryInput").value=h.q; doSearch(); };
    row.querySelector(".r-del").onclick = (ev)=>{ ev.stopPropagation(); history.splice(idx,1); store.set(LS.hist,history); renderHistory(); refreshBadges(); };
    host.appendChild(row);
  });
}

/* =========================================================================
   復習クイズ
   ========================================================================= */
let quizPool=[], quizIdx=0, quizScore=0;
function startQuiz(){
  const source = favorites.length>=3 ? favorites.map(byId).filter(Boolean) : PHRASES.slice();
  quizPool = source.sort(()=>Math.random()-0.5).slice(0, Math.min(10, source.length));
  quizIdx=0; quizScore=0;
  renderQuiz();
}
function renderQuiz(){
  const host = $("#quizArea"); host.innerHTML="";
  if(!quizPool.length){ startQuiz(); return; }
  if(quizIdx>=quizPool.length){
    host.appendChild(el("div","quiz-card",
      `<div class="quiz-done-emoji">🎉</div>
       <div class="q-ja">おつかれさま！</div>
       <div class="score-badge"><b>${quizScore}</b><span>/ ${quizPool.length} 問</span></div>
       <button class="btn btn-primary" style="margin-top:16px" onclick="startQuiz()">もう一度</button>`));
    return;
  }
  const e = quizPool[quizIdx];
  const card = el("div","quiz-card");
  const pct = Math.round((quizIdx/quizPool.length)*100);
  card.innerHTML = `<div class="quiz-progress">
      <span class="quiz-progress-num">${quizIdx+1} / ${quizPool.length}</span>
      ${favorites.length>=3?'<span class="quiz-progress-tag">お気に入りから出題</span>':""}
      <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-sit">🧭 ${esc(e.situation)}</div>
    <div class="q-ja">「${esc(e.prompt.ja)}」</div>
    <div class="q-sit">この場面で “伝わる英語” は？</div>
    <button class="btn btn-primary" id="revealBtn" style="margin-top:10px">答えを見る</button>
    <div class="quiz-reveal" id="reveal"></div>`;
  host.appendChild(card);
  $("#revealBtn").onclick = ()=>{
    $("#revealBtn").style.display="none";
    const r = $("#reveal");
    r.appendChild(answerBlock("natural","伝わる英語", e.natural, e.id));
    r.appendChild(answerBlock("school","学校式", e.school, e.id));
    r.appendChild(el("div","point",`📝 ${e.point}`));
    const grade = el("div","quiz-grade");
    const ok = el("button","btn btn-ok","○ 言えた");
    const ng = el("button","btn btn-ng","△ あやしい");
    ok.onclick = ()=>{ quizScore++; quizIdx++; renderQuiz(); };
    ng.onclick = ()=>{ quizIdx++; renderQuiz(); };
    grade.appendChild(ok); grade.appendChild(ng);
    r.appendChild(grade);
  };
}

/* =========================================================================
   タブ・初期化
   ========================================================================= */
function switchTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  $("#panel-"+tab).classList.add("active");
  document.querySelectorAll("nav.tabbar button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  if(tab==="scenes") renderScenes();
  if(tab==="fav") renderFav();
  if(tab==="history") renderHistory();
  if(tab==="quiz") startQuiz();
  window.scrollTo({top:0,behavior:"smooth"});
}
function refreshBadges(){
  // 履歴タブにバッジは付けず、ここは将来拡張用のフック
}
function initLangSeg(){
  const seg = $("#langSeg");
  seg.querySelectorAll("button").forEach(b=>{
    b.classList.toggle("on", b.dataset.lang===settings.voiceLang);
    b.onclick = ()=>{
      settings.voiceLang=b.dataset.lang; store.set(LS.set, settings);
      seg.querySelectorAll("button").forEach(x=>x.classList.toggle("on", x===b));
    };
  });
}
function init(){
  renderExampleChips();
  initLangSeg();
  $("#searchBtn").onclick = doSearch;
  $("#micBtn").onclick = toggleMic;
  $("#queryInput").addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){ doSearch(); } });
  $("#clearHistory").onclick = ()=>{ if(confirm("履歴をすべて消しますか？")){ history=[]; store.set(LS.hist,history); renderHistory(); } };
  document.querySelectorAll("nav.tabbar button").forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
  // 音声リストの遅延ロード対策
  if("speechSynthesis" in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; window.speechSynthesis.getVoices(); }
  initAutoUpdate();
}
window.startQuiz = startQuiz; // インラインonclick用
init();

/* =========================================================================
   自動アップデート（改善版を公開したら、開きっぱなしのタブにも自動反映）
   - 単一HTMLでバージョン番号の手動管理をしないよう、取得したHTML本文の
     ハッシュ値を比較して「変わったかどうか」だけを見る。
   - 入力中は奪わず、操作の切れ目（blur / タブ非表示 / 最大1分）で更新。
   ========================================================================= */
let pageHash = null;
let updating = false;
function hashText(s){
  let h = 0;
  for (let i=0; i<s.length; i++){ h = (Math.imul(h, 31) + s.charCodeAt(i)) | 0; }
  return h;
}
function reloadForUpdate(){
  if (updating) return;
  updating = true;
  const ae = document.activeElement;
  const typing = ae && (ae.tagName === "TEXTAREA" || ae.tagName === "INPUT") && ae.value && ae.value.length > 0;
  if (typing){
    toast("✨ 新しいバージョンに更新します（入力おわりに）");
    const go = ()=> location.reload();
    window.addEventListener("blur", go, { once:true });
    document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") go(); }, { once:true });
    setTimeout(go, 60000);
    return;
  }
  location.reload();
}
async function checkForUpdate(){
  try{
    const res = await fetch(location.pathname + "?_=" + Date.now(), { cache:"no-store" });
    if(!res.ok) return;
    const text = await res.text();
    const h = hashText(text);
    if(pageHash === null){ pageHash = h; return; }
    if(h !== pageHash){ reloadForUpdate(); }
  }catch(e){ /* オフライン等は無視 */ }
}
function initAutoUpdate(){
  checkForUpdate(); // 初回は基準ハッシュを保存するだけ
  setInterval(checkForUpdate, 30*60*1000); // 30分ごと
  document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") checkForUpdate(); });
}
